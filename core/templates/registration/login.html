{% extends "base.html" %}

{% block content %}
<h2>Login</h2>

{% if form.errors %}
    <p class="error">Invalid username or password</p>
{% endif %}

{% if next %}
    <p class="info">You must log in to continue</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
</form>

{% endblock %}
